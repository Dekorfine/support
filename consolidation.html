                    <div className="flex items-center justify-between mb-5">
                        <div className="flex items-center gap-3">
                            <span className="text-[10px] font-bold uppercase tracking-widest" style={{color: accentColor}}>
                                ◆ 推荐方案 · RECOMMENDED
                            </span>
                            <span className="pulse-dot w-2 h-2 rounded-full" style={{background: accentColor}}></span>
                        </div>
                        <span className="text-[10px] font-mono font-bold uppercase tracking-widest opacity-60">
                            03 · VERDICT
                        </span>
                    </div>

                    <div className="flex items-end justify-between gap-6 mb-6 flex-wrap">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <Icon name={planIcon} className="w-7 h-7" style={{color: accentColor}} />
                                <h2 className="font-display text-4xl md:text-5xl font-extrabold tracking-tight">
                                    {planLabel}
                                </h2>
                            </div>
                            <div className="text-xs font-bold opacity-80 mb-2" style={{color: accentColor}}>
                                ▸ {channelLabel}
                            </div>
                            <div className="flex items-center gap-2 flex-wrap mt-3">
                                {key === 'consol' && (
                                    <span className="box-viz" style={{background: 'rgba(255,255,255,0.1)', borderColor: 'rgba(255,255,255,0.3)', color: '#faf8f3'}}>
                                        共 {planConsol.totalBoxes} 箱 · {totalQty} 件
                                    </span>
                                )}
                                {key === 'split' && (
                                    <span className="box-viz" style={{background: 'rgba(255,255,255,0.1)', borderColor: 'rgba(255,255,255,0.3)', color: '#faf8f3'}}>
                                        {totalQty} 箱 · 每件独立打包
                                    </span>
                                )}
                                {key === 'yunding' && (
                                    <span className="box-viz" style={{background: 'rgba(255,255,255,0.1)', borderColor: 'rgba(255,255,255,0.3)', color: '#faf8f3'}}>
                                        整车一次性派送 · {totalQty} 件
                                    </span>
                                )}
                            </div>
                        </div>

                        <div className="text-right">
                            <div className="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1">预估总成本</div>
                            <div className="display-num text-6xl" style={{color: accentColor}}>
                                ¥{Math.round(rec.best.cost).toLocaleString()}
                            </div>
                            {rec.savings.vsSplit > 50 && key !== 'split' && (
                                <div className="text-[11px] font-bold mt-2 opacity-90">
                                    较「拆分发货」节省 <span style={{color: accentColor}}>¥{Math.round(rec.savings.vsSplit).toLocaleString()}</span>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="border-t pt-5" style={{borderColor: 'rgba(255,255,255,0.15)'}}>
                        <div className="text-[10px] font-bold uppercase tracking-widest mb-3 opacity-60">
                            推荐理由
                        </div>
                        <ul className="space-y-2">
                            {rec.reasons.map((r, i) => (
                                <li key={i} className="text-sm font-medium flex gap-2 leading-relaxed">
                                    <span style={{color: accentColor}} className="font-bold">▸</span>
                                    <span className="opacity-95">{r}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            </div>
        );
    };

    // === 承运商选择器/比价 ===
    const CarrierPicker = ({ bestCarrier, allCarriers }) => {
        const [open, setOpen] = useState(false);
        if (!bestCarrier) return null;
        return (
            <div className="rounded-lg p-3 mb-3" style={{background: 'var(--accent-soft)', border: '1.5px solid var(--accent)'}}>
                <div className="flex items-center justify-between flex-wrap gap-2">
                    <div className="flex items-center gap-2">
                        <span className="text-[10px] font-bold uppercase tracking-wider" style={{color: 'var(--accent)'}}>
                            ◆ 推荐承运商
                        </span>
                        <span className="font-display text-base font-bold" style={{color: 'var(--accent)'}}>
                            {bestCarrier.name}
                        </span>
                        <span className="font-mono font-bold text-sm" style={{color: 'var(--accent)'}}>
                            ¥{Math.round(bestCarrier.totalCost).toLocaleString()}
                        </span>
                    </div>
                    {allCarriers && allCarriers.length > 1 && (
                        <button
                            onClick={() => setOpen(!open)}
                            className="text-[10px] font-bold tracking-wider"
                            style={{
                                background: 'transparent',
                                border: '1px solid var(--accent)',
                                color: 'var(--accent)',
                                cursor: 'pointer',
                                fontFamily: 'inherit',
                                padding: '4px 10px',
                                borderRadius: '4px'
                            }}>
                            {open ? '收起' : '查看其他承运商 ▾'}
                        </button>
                    )}
                </div>
                {open && allCarriers && (
                    <div className="mt-3 space-y-1">
                        {allCarriers.map((c, i) => (
                            <div key={c.carrierId} className="flex items-center justify-between text-[11px] font-mono py-1.5 px-2 rounded" style={{
                                background: i === 0 ? 'rgba(184,70,46,0.1)' : 'rgba(255,255,255,0.5)'
                            }}>
                                <span className="flex items-center gap-2">
                                    <span className="font-bold" style={{color: i === 0 ? 'var(--accent)' : 'var(--ink-3)'}}>
                                        {i === 0 ? '🏆' : `#${i+1}`}
                                    </span>
                                    <span className="font-bold" style={{color: 'var(--ink-2)'}}>
                                        {c.name}
                                    </span>
                                </span>
                                <span className="font-bold" style={{color: i === 0 ? 'var(--accent)' : 'var(--ink-2)'}}>
                                    ¥{Math.round(c.totalCost).toLocaleString()}
                                    {i > 0 && <span className="text-[9px] ml-1 opacity-60">(+¥{Math.round(c.totalCost - allCarriers[0].totalCost).toLocaleString()})</span>}
                                </span>
                            </div>
                        ))}
                        <div className="text-[10px] font-medium mt-2 pt-2 border-t" style={{color: 'var(--ink-3)', borderColor: 'var(--accent)'}}>
                            <Icon name="info" className="w-3 h-3 inline mr-1" />
                            系统已自动比较 {allCarriers.length} 个常规渠道，选最便宜的。具体出货可根据实际情况选择。
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // === 操作建议卡（走云鼎时提示改木箱）===
    const ActionHintCard = ({ packageAnalyses, onConvertAllToCrate }) => {
        const cartonPkgs = packageAnalyses.filter(p => !p.isCrate);
        const cartonBoxes = cartonPkgs.reduce((s, p) => s + p.qty, 0);
        const cratePkgs = packageAnalyses.filter(p => p.isCrate);
        const crateBoxes = cratePkgs.reduce((s, p) => s + p.qty, 0);
        return (
            <div className="rounded-2xl p-5 anim-fadeup relative overflow-hidden" style={{
                background: 'linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)',
                border: '1.5px solid var(--warn-line)'
            }}>
                <div className="flex items-start gap-3">
                    <div className="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center" style={{background: 'var(--warn)', color: 'white'}}>
                        <Icon name="alert-triangle" className="w-5 h-5" />
                    </div>
                    <div className="flex-1">
                        <div className="flex items-center gap-2 mb-1">
                            <h3 className="font-display text-base font-bold" style={{color: 'var(--warn)'}}>
                                包装操作建议
                            </h3>
                            <span className="text-[10px] font-mono font-bold uppercase tracking-widest" style={{color: 'var(--warn)'}}>
                                · 走云鼎前必看
                            </span>
                        </div>
                        <p className="text-[13px] font-medium leading-relaxed mb-3" style={{color: '#78350f'}}>
                            当前订单含 <span className="font-bold">{cartonBoxes} 箱纸箱包装</span>
                            {crateBoxes > 0 && <span>（已有 {crateBoxes} 箱木箱）</span>}。
                            云鼎卡车海运 + 卡车派送过程中纸箱有<span className="font-bold">被压坏风险</span>，
                            建议把所有纸箱改打<span className="font-bold">夹板木箱</span>避免运输损坏。
                        </p>
                        <div className="rounded-lg p-2.5 mb-3 text-[11px]" style={{background: 'rgba(255,255,255,0.5)', border: '1px solid var(--warn-line)'}}>
                            <div className="font-bold mb-1" style={{color: 'var(--warn)'}}>📦 改木箱后的影响：</div>
                            <div className="space-y-0.5 font-mono" style={{color: '#78350f'}}>
                                <div>· 云鼎渠道 <span className="font-bold">不收木箱附加费</span>，只增加木箱材料 + 人工成本</div>
                                <div>· 运输安全大幅提升，减少破损/退货风险</div>
                                <div>· 卖价推演会自动加入木箱材料费</div>
                            </div>
                        </div>
                        <button
                            onClick={onConvertAllToCrate}
                            className="px-4 py-2 rounded-lg text-xs font-bold tracking-tight transition-all"
                            style={{
                                background: 'var(--warn)',
                                color: 'white',
                                border: 'none',
                                cursor: 'pointer',
                                fontFamily: 'inherit',
                                display: 'inline-flex',
                                alignItems: 'center',
                                gap: '6px'
                            }}
                            onMouseEnter={(e) => e.currentTarget.style.opacity = '0.85'}
                            onMouseLeave={(e) => e.currentTarget.style.opacity = '1'}>
                            <Icon name="package-2" className="w-3.5 h-3.5" />
                            一键全部改为夹板木箱（{cartonBoxes} 箱）
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    // === 包装行输入组件 ===
    const PackageRow = ({ pkg, idx, canRemove, onUpdate, onToggleCrate, onToggleForceSingle, onRemove, weightSuggest }) => {
        return (
            <div className="rounded-xl p-4 transition-all" style={{
                background: pkg.isCrate ? 'var(--warn-soft)' : 'var(--bg)',
                border: pkg.isCrate ? '1.5px solid var(--warn-line)' : '1.5px solid var(--line-soft)'
            }}>
                <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-2">
                        <span className="font-mono font-black text-xs px-2 py-0.5 rounded" style={{
                            background: pkg.isCrate ? 'var(--warn)' : 'var(--ink)',
                            color: pkg.isCrate ? 'var(--warn-soft)' : 'var(--bg)'
                        }}>
                            包装 {idx + 1}
                        </span>
                        <span className="text-[10px] font-bold uppercase tracking-wider" style={{color: pkg.isCrate ? 'var(--warn)' : 'var(--ink-3)'}}>
                            {pkg.isCrate ? '木箱 +5cm 缓冲' : '纸箱 +2cm 缓冲'}
                        </span>
                    </div>
                    {canRemove && (
                        <button onClick={onRemove}
                            className="p-1 rounded-md transition-all hover:bg-rose-100"
                            style={{background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--ink-4)'}}
                            title="删除此包装">
                            <Icon name="x" className="w-3.5 h-3.5" />
                        </button>
                    )}
                </div>

                {/* L W H */}
                <div className="grid grid-cols-3 gap-2 mb-3">
                    <div>
                        <input type="number" value={pkg.l} onChange={(e) => onUpdate('l', e.target.value)}
                            className="field-input field-input-sm" placeholder="长 cm" />
                    </div>
                    <div>
                        <input type="number" value={pkg.w} onChange={(e) => onUpdate('w', e.target.value)}
                            className="field-input field-input-sm" placeholder="宽 cm" />
                    </div>
                    <div>
                        <input type="number" value={pkg.h} onChange={(e) => onUpdate('h', e.target.value)}
                            className="field-input field-input-sm" placeholder="高 cm" />
                    </div>
                </div>

                {/* Weight + Qty */}
                <div className="grid grid-cols-2 gap-3 mb-2">
                    <div className="relative">
                        <input type="number" value={pkg.weight} onChange={(e) => onUpdate('weight', e.target.value)}
                            className="field-input field-input-sm"
                            placeholder="实重 kg (选填)"
                            style={weightSuggest ? {borderBottomColor: 'var(--warn)'} : {}} />
                        <span className="absolute right-0 top-0 text-[9px] font-bold tracking-wider" style={{color: weightSuggest ? 'var(--warn)' : 'var(--ink-4)'}}>
                            {weightSuggest ? '建议填写' : '选填'}
                        </span>
                    </div>
                    <div>
                        <input type="number" value={pkg.qty} onChange={(e) => onUpdate('qty', e.target.value)}
                            className="field-input field-input-sm" placeholder="数量 件" />
                    </div>
                </div>

                {/* 大件建议提示 */}
                {weightSuggest && (
                    <div className="text-[10px] font-medium mb-2 px-2 py-1.5 rounded flex items-start gap-1.5" style={{background: 'var(--warn-soft)', color: 'var(--warn)', border: '1px solid var(--warn-line)'}}>
                        <Icon name="info" className="w-3 h-3 flex-shrink-0 mt-0.5" />
                        <span>此包装属大件（围长≥265cm 或长边≥120cm），建议填写实重，否则系统按体积重计算可能偏高</span>
                    </div>
                )}

                {/* Crate / Carton toggle */}
                <div className="flex items-center gap-2 mb-2">
                    <span className="text-[10px] font-bold uppercase tracking-wider" style={{color: 'var(--ink-3)'}}>包装类型</span>
                    <div className="flex gap-1 ml-auto">
                        <button
                            onClick={() => onToggleCrate(false)}
                            className="pill"
                            style={!pkg.isCrate ? {background: 'var(--ink)', color: 'white', borderColor: 'var(--ink)'} : {}}>
                            纸箱
                        </button>
                        <button
                            onClick={() => onToggleCrate(true)}
                            className="pill"
                            style={pkg.isCrate ? {background: 'var(--warn)', color: 'white', borderColor: 'var(--warn)'} : {}}>
                            木箱 ↑10%
                        </button>
                    </div>
                </div>

                {/* 强制单件装箱开关 */}
                <div className="flex items-center gap-2 px-2 py-1.5 rounded text-[11px]" style={{
                    background: pkg.forceSingleBox ? 'var(--accent-soft)' : 'var(--bg)',
                    border: '1px solid',
                    borderColor: pkg.forceSingleBox ? 'var(--accent)' : 'var(--line-soft)'
                }}>
                    <input
                        type="checkbox"
                        checked={!!pkg.forceSingleBox}
                        onChange={(e) => onToggleForceSingle(e.target.checked)}
                        style={{cursor: 'pointer'}} />
                    <span className="font-medium flex-1" style={{color: pkg.forceSingleBox ? 'var(--accent)' : 'var(--ink-3)'}}>
                        强制每件单独装箱 (不合箱)
                    </span>
                    <span className="text-[9px] font-mono opacity-70" style={{color: pkg.forceSingleBox ? 'var(--accent)' : 'var(--ink-4)'}}>
                        {pkg.forceSingleBox ? '✓ 1件/箱' : '系统自动合箱'}
                    </span>
                </div>
            </div>
        );
    };

    // === 单包装实时状态 ===
    const PackageStatus = ({ pkg, idx }) => {
        const status = pkg.check.ok ? 'good' : 'bad';
        const isOversized = !pkg.check.ok;
        const cardStyle = status === 'good'
            ? { background: 'var(--good-soft)', borderColor: 'var(--good-line)' }
            : { background: 'var(--bad-soft)', borderColor: 'var(--bad-line)' };
        return (
            <div className="rounded-lg p-3 border" style={cardStyle}>
                <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-mono font-black text-[10px] px-1.5 py-0.5 rounded" style={{
                            background: pkg.isCrate ? 'var(--warn)' : 'var(--ink)',
                            color: 'white'
                        }}>
                            包装{idx + 1}
                        </span>
                        <span className={`chip text-[9px] ${isOversized ? 'chip-bad' : 'chip-good'}`}>
                            {isOversized ? '超大件' : '小件'}
                        </span>
                        <span className="text-[10px] font-mono font-bold" style={{color: 'var(--ink-2)'}}>
                            {pkg.l}×{pkg.w}×{pkg.h} · {pkg.weight}kg × {pkg.qty}件
                        </span>
                    </div>
                    <Icon name={status === 'good' ? 'check' : 'x'} className="w-4 h-4" style={{color: status === 'good' ? 'var(--good)' : 'var(--bad)'}} />
                </div>
                <div className="grid grid-cols-4 gap-1.5 text-[10px] font-mono">
                    <Cell label="长边" val={pkg.dim.longest.toFixed(0)} unit="cm" limit={LIMITS.longestMax} />
                    <Cell label="二边" val={pkg.dim.second.toFixed(0)} unit="cm" limit={LIMITS.secondMax} />
                    <Cell label="实重" val={pkg.weight.toFixed(1)} unit="kg" limit={LIMITS.weightMax} />
                    <Cell label="围长" val={pkg.dim.girth.toFixed(0)} unit="cm" limit={LIMITS.girthMax} />
                </div>
                {pkg.sur.list.length > 0 && (
                    <div className="mt-2 pt-2 border-t flex flex-wrap gap-1" style={{borderColor: 'var(--bad-line)'}}>
                        {pkg.sur.list.map((s, i) => (
                            <span key={i} className="text-[9px] font-mono font-bold px-1.5 py-0.5 rounded" style={{background: 'rgba(239,68,68,0.15)', color: 'var(--bad)'}}>
                                {s.name} +¥{s.cost}
                            </span>
                        ))}
                        <span className="ml-auto text-[10px] font-mono font-bold" style={{color: 'var(--bad)'}}>
                            单件附加 ¥{pkg.sur.total}/件 × {pkg.qty}件
                        </span>
                    </div>
                )}
            </div>
        );
    };

    const Cell = ({ label, val, unit, limit }) => {
        const over = parseFloat(val) > limit;
        return (
            <div className="flex flex-col">
                <span className="text-[9px] opacity-60 uppercase">{label}</span>
                <span className="font-bold" style={{color: over ? 'var(--bad)' : 'var(--ink-2)'}}>
                    {val}{unit}
                </span>
            </div>
        );
    };

    const PlanCardConsol = ({ plan, isBest }) => {
        const ok = plan.canConsolidate;
        return (
            <div className={`plan-card ${isBest ? 'best' : ''} ${!ok ? 'disabled' : ''}`}>
                <div className="p-5">
                    <div className="flex items-center justify-between mb-3">
                        <div className="flex items-center gap-2">
                            <span className="text-[11px] font-bold uppercase tracking-widest font-mono" style={{color: 'var(--ink-3)'}}>方案 A</span>
                            <Icon name="boxes" className="w-4 h-4" style={{color: 'var(--ink-2)'}} />
                            <h4 className="font-display text-lg font-bold" style={{color: 'var(--ink)'}}>优化方案</h4>
                            {isBest && <span className="chip chip-good text-[9px]"><Icon name="check" className="w-3 h-3" /> 最优</span>}
                            {plan.anyFailed && <span className="chip chip-warn text-[9px]">部分仍超规</span>}
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] font-bold uppercase tracking-wider" style={{color: 'var(--ink-4)'}}>预估总价</div>
                            <div className="font-mono font-bold text-xl" style={{color: 'var(--ink)'}}>¥{Math.round(plan.totalCost).toLocaleString()}</div>
                        </div>
                    </div>

                    {/* 推荐承运商 + 比价 */}
                    {plan.bestCarrier && (
                        <CarrierPicker bestCarrier={plan.bestCarrier} allCarriers={plan.allCarriers} />
                    )}

                    <div className="flex items-center gap-2 flex-wrap mb-4">
                        <span className="box-viz" style={{background: 'var(--good-soft)', borderColor: 'var(--good-line)', color: 'var(--good)'}}>
                            <Icon name="boxes" className="w-3 h-3 inline mr-1" />
                            共发 {plan.totalBoxes} 箱
                        </span>
                        {plan.anyConsolidated && (
                            <span className="box-viz">小件已合箱</span>
                        )}
                        {plan.anyHeightSplit && (
                            <span className="box-viz">超大件已高度拆分</span>
                        )}
                    </div>

                    {/* Per-group breakdown */}
                    <div className="space-y-2">
                        {plan.groupPlans.map((g, i) => (
                            <GroupConsolRow key={g.id} group={g} idx={i} />
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    const GroupConsolRow = ({ group, idx }) => {
        if (group.strategy === 'heightSplit') {
            return <GroupHeightSplitRow group={group} idx={idx} />;
        }
        // Default: consolidation
        const c = group.consol;
        const isCrate = group.isCrate;
        return (
            <div className="rounded-lg p-3" style={{background: 'var(--bg)', border: '1px solid var(--line-soft)'}}>
                <div className="flex items-center justify-between mb-2 flex-wrap gap-1">
                    <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-mono font-black text-[10px] px-1.5 py-0.5 rounded" style={{
                            background: isCrate ? 'var(--warn)' : 'var(--ink)', color: 'white'
                        }}>包装{idx + 1}</span>
                        {group.isOversized ? (
                            <span className="chip chip-bad text-[9px]">超大件 · {c.maxValidN > 1 ? '可合箱' : '单件直发'}</span>
                        ) : (
                            <span className="chip chip-good text-[9px]">小件 · 合箱</span>
                        )}
                        {c.forcedSingle && (
                            <span className="chip text-[9px]" style={{background: 'var(--accent-soft)', borderColor: 'var(--accent)', color: 'var(--accent)'}}>
                                ⛓ 强制 1件/箱
                            </span>
                        )}
                        <span className="text-[10px] font-mono" style={{color: 'var(--ink-3)'}}>
                            {group.l}×{group.w}×{group.h} · {isCrate ? '木箱' : '纸箱'} × {group.qty}件
                        </span>
                    </div>
                    {c.canConsolidate ? (
                        <span className="text-[10px] font-bold" style={{color: 'var(--good)'}}>
                            → {c.totalBoxes}箱 · ¥{Math.round(c.totalFreight).toLocaleString()}
                        </span>
                    ) : (
                        <span className="text-[10px] font-bold" style={{color: 'var(--bad)'}}>
                            → 无法合箱
                        </span>
                    )}
                </div>

                {c.canConsolidate && c.groupList && (
                    <>
                        {/* 总体分配概览 */}
                        <div className="flex flex-wrap gap-1 text-[10px] font-mono mb-2">
                            {c.groupList.map((g, gi) => (
                                <span key={gi} className="box-viz" style={
                                    c.groupList.length > 1 ? {background: 'var(--good-soft)', borderColor: 'var(--good-line)', color: 'var(--good)'} : {}
                                }>
                                    {g.count}件/箱 × {g.n}箱
                                </span>

    // === 费率参考表（所有国家所有渠道）===
    const RateReferenceCard = ({ validPackages, region, country, targetCN, auZip, isRemoteCA, planYunding }) => {
        const [openTab, setOpenTab] = useState('US');  // US/CA/AU/ME

        // 把 validPackages 转换为渠道函数需要的 boxes 格式
        // dims = 产品尺寸（用于体积重）; surchargeBuffer = 包装缓冲（用于附加费判定）
        const boxes = (validPackages || []).map(p => ({
            dims: [p.l, p.w, p.h],
            surchargeBuffer: p.isCrate ? CRATE_BUFFER : PACK_BUFFER,
            weight: p.weight || 0,
            qty: p.qty,
            isCrate: !!p.isCrate
        }));
        const hasInput = boxes.length > 0;
        const totalQty = boxes.reduce((s, b) => s + b.qty, 0);
        const isMulti = totalQty > 1;

        // 计算美国渠道（per-box × qty）
        const calcUSLive = (carrierId) => {
            if (!hasInput) return null;
            if ((carrierId === 'ch_small' || carrierId === 'my_small') && isMulti) {
                return { invalid: true, reason: '仅单件订单可用' };
            }
            let total = 0, totalBW = 0;
            try {
                boxes.forEach(box => {
                    const r = calcBoxByCarrier(carrierId, box.dims, box.weight, !!box.isCrate, region, isMulti);
                    total += r.totalCost * box.qty;
                    totalBW += r.billWeight * box.qty;
                });
                return { totalCost: total, billWeight: Math.ceil(totalBW), valid: true };
            } catch (e) {
                return { invalid: true, reason: '计算异常' };
            }
        };

        // 加拿大渠道
        const liveCAXY = hasInput ? calcCarrierCAXY(boxes, { isRemote: isRemoteCA }) : null;
        const liveCAHC = hasInput ? calcCarrierCAHC(boxes, { isRemote: isRemoteCA }) : null;
        const liveCAZS = hasInput ? calcCarrierCAZS(boxes, { isRemote: isRemoteCA }) : null;
        // 澳洲
        const liveAU = hasInput ? calcCarrierAU(boxes, { zip: auZip }) : null;
        // 中东
        const liveMEUAE = hasInput ? calcCarrierUAE(boxes, {}) : null;
        const liveMESA = hasInput ? calcCarrierSA(boxes, {}) : null;
        const liveMEUAEAir = hasInput ? calcCarrierUAEAir(boxes, {}) : null;
        const liveMESAAir = hasInput ? calcCarrierSAAir(boxes, {}) : null;
        // 中邮
        const liveCNAir = hasInput && targetCN ? calcCarrierCNAir(boxes, { targetCN }) : null;
        const liveCNEMS = hasInput && targetCN ? calcCarrierCNEMS(boxes, { targetCN }) : null;
        // 美国
        const liveCH = calcUSLive('ch');
        const liveCHSmall = calcUSLive('ch_small');
        const liveMY = calcUSLive('my');
        const liveMYSmall = calcUSLive('my_small');
        const liveZS = calcUSLive('zs');

        // 找出各 Tab 中最便宜的渠道
        const findCheapest = (items) => {
            const valid = items.filter(x => x && !x.invalid && x.valid !== false && x.totalCost > 0 && isFinite(x.totalCost));
            if (valid.length === 0) return null;
            return valid.reduce((a, b) => a.totalCost <= b.totalCost ? a : b);
        };
        const cheapestUS = findCheapest([liveCH, liveCHSmall, liveMY, liveMYSmall, liveZS]);
        const cheapestCA = findCheapest([liveCAXY, liveCAHC, liveCAZS]);
        const cheapestME = findCheapest([liveMEUAE, liveMESA, liveMEUAEAir, liveMESAAir]);
        const cheapestCN = findCheapest([liveCNAir, liveCNEMS]);

        // 计算各包装最大尺寸 / 围长（已含 buffer），用于大件警告
        const dimAlerts = boxes.map((b, i) => {
            const sides = [...b.dims].sort((a, b2) => b2 - a);
            const girth = sides[0] + 2 * (sides[1] + sides[2]);

                            { label: '六区', val: '加拿大+欧洲（法德英意西荷比奥...）· 起重 ¥280 · 续重 ¥75' },
                            { label: '七区', val: '印巴次大陆（印度/巴基/孟/尼/斯/老/土）· 起重 ¥300 · 续重 ¥80' },
                            { label: '八区', val: '阿联酋/俄/巴西/阿根廷/墨西哥/中东欧 · 起重 ¥335 · 续重 ¥100' },
                            { label: '九区', val: '沙特/中东大部/非洲大部 · 起重 ¥445 · 续重 ¥120' },
                            { label: '提示', val: '示例 美国 1kg 件 ≈ (240+1×75)×0.6 ≈ ¥189 (实重) 或 ≈ vol×... (记抛)' },
                        ]}/>
                        <div className="text-[10px] font-mono p-3 rounded mt-3" style={{background: 'var(--bg)', color: 'var(--ink-3)', border: '1px dashed var(--line)'}}>
                            ⓘ 中邮渠道每件独立计费，不合箱。系统对每件包装单独算价后求和。<br/>
                            ⓘ 国际航空包裹 7折、EMS 6折 是默认折扣，实际折扣可与邮政业务员谈。<br/>
                            ⓘ 灯具体积重通常远大于实重，<span style={{color: 'var(--bad)', fontWeight: 'bold'}}>EMS 任一边 &gt;60cm 自动记抛后</span>，价格会显著上涨；普通灯具优先考虑国际航空包裹。
                        </div>
                    </div>
                )}

                {/* 全局合箱红线 */}
                <div className="mt-6 pt-5 border-t" style={{borderColor: 'var(--line-soft)'}}>
                    <div className="text-[11px] font-bold uppercase tracking-widest mb-3" style={{color: 'var(--ink-3)'}}>
                        🔴 合箱算法红线（系统判定基础）
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs font-mono">
                        <div className="rounded p-2.5" style={{background: 'var(--bg)', border: '1px solid var(--line-soft)'}}>
                            <div className="font-bold mb-1" style={{color: 'var(--ink)'}}>最长边</div>
                            <div style={{color: 'var(--ink-2)'}}>≤ 120 cm</div>
                        </div>
                        <div className="rounded p-2.5" style={{background: 'var(--bg)', border: '1px solid var(--line-soft)'}}>
                            <div className="font-bold mb-1" style={{color: 'var(--ink)'}}>第二边</div>
                            <div style={{color: 'var(--ink-2)'}}>≤ 75 cm</div>
                        </div>
                        <div className="rounded p-2.5" style={{background: 'var(--bg)', border: '1px solid var(--line-soft)'}}>
                            <div className="font-bold mb-1" style={{color: 'var(--ink)'}}>实重</div>
                            <div style={{color: 'var(--ink-2)'}}>≤ 22 kg (软) · ≤ 40 (硬)</div>
                        </div>
                        <div className="rounded p-2.5" style={{background: 'var(--bg)', border: '1px solid var(--line-soft)'}}>
                            <div className="font-bold mb-1" style={{color: 'var(--ink)'}}>围长</div>
                            <div style={{color: 'var(--ink-2)'}}>≤ 265 cm (软) · ≤ 320 (硬)</div>
                        </div>
                    </div>
                    <div className="text-[10px] font-mono mt-3" style={{color: 'var(--ink-4)'}}>
                        ⓘ 系统以美国常规渠道为基准制定合箱红线。加拿大允许最长 270cm，澳洲允许 369cm，实际单件可能比合箱算法允许的更大；如发现 "超大件" 实际可走某国常规渠道，可手动确认。
                    </div>
                </div>
            </div>
        );
    };

    // 渠道费率展示块
    const CarrierRefBlock = ({ title, color, rows, liveCost, isCheapest, isInvalid, invalidReason, billWeight }) => {
        const [open, setOpen] = useState(false);
        return (
            <div className="rounded-lg overflow-hidden" style={{border: `1.5px solid ${isCheapest ? color : color + '33'}`, boxShadow: isCheapest ? `0 0 0 1px ${color}33` : 'none'}}>
                <button onClick={() => setOpen(!open)}
                    className="w-full px-3 py-2 flex items-center justify-between text-left transition-all gap-2"
                    style={{background: open ? `${color}11` : (isCheapest ? `${color}08` : 'white'), cursor: 'pointer', border: 'none', fontFamily: 'inherit'}}>
                    <span className="flex items-center gap-2 flex-1 min-w-0">
                        <span className="w-1 h-5 rounded-full flex-shrink-0" style={{background: color}}></span>
                        <span className="font-display text-sm font-bold" style={{color}}>{title}</span>
                        {isCheapest && (
                            <span className="text-[9px] font-bold px-1.5 py-0.5 rounded flex-shrink-0" style={{background: color, color: 'white'}}>✓ 当前最便宜</span>
                        )}
                    </span>
                    <div className="flex items-center gap-2 flex-shrink-0">
                        {liveCost !== undefined && liveCost !== null && (
                            isInvalid ? (
                                <span className="text-[10px] font-mono px-2 py-0.5 rounded font-bold" style={{background: 'var(--bad-soft)', color: 'var(--bad)'}}>
                                    ✗ {invalidReason || '不可用'}
                                </span>
                            ) : (
                                <span className="text-right">
                                    <span className="text-sm font-mono font-bold tabular-nums" style={{color}}>
                                        ¥{Math.round(liveCost).toLocaleString()}
                                    </span>
                                    {billWeight ? <span className="text-[9px] font-mono ml-1" style={{color: 'var(--ink-4)'}}>{billWeight}kg</span> : null}
                                </span>
                            )
                        )}
                        <span className="text-[10px] font-mono" style={{color: 'var(--ink-3)'}}>
                            {open ? '收起 ▴' : '展开 ▾'}
                        </span>
                    </div>
                </button>
                {open && (
                    <div className="p-3 space-y-1.5" style={{background: `${color}05`}}>
                        {rows.map((r, i) => (
                            <div key={i} className="grid grid-cols-[110px_1fr] gap-3 text-[11px] py-1 border-b last:border-0" style={{borderColor: `${color}22`}}>
                                <div className="font-bold font-mono uppercase tracking-wider" style={{color}}>{r.label}</div>
                                <div className="font-mono" style={{color: r.warn ? 'var(--bad)' : 'var(--ink-2)'}}>{r.val}</div>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    };

    // === 卖价推演卡片（财务核算用）===
    const SalesPriceCard = ({ sp, recLabel, totalQty, purchasePrice, setPurchasePrice, exchangeRate, setExchangeRate, profitMultiplier, setProfitMultiplier }) => {
        const hasPurchase = parseFloat(purchasePrice) > 0;
        return (
            <div className="paper rounded-2xl p-6 anim-fadeup" style={{border: '1.5px solid var(--line-soft)'}}>
                <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-2">
                        <span className="w-1.5 h-6 rounded-full" style={{background: 'var(--accent)'}}></span>
                        <h3 className="font-display text-xl font-bold tracking-tight" style={{color: 'var(--ink)'}}>
                            卖价推演 · 财务核算
                        </h3>
                    </div>
                    <span className="text-[10px] font-mono font-bold uppercase tracking-widest" style={{color: 'var(--ink-4)'}}>
                        05 · PRICE
                    </span>
                </div>

                {/* 输入参数 */}
                <div className="grid grid-cols-3 gap-3 mb-4">
                    <div>
                        <label className="field-label">
                            采购单价 (元)
                            <span className="ml-1" style={{color: 'var(--accent)'}}>*</span>
                        </label>
                        <input type="number" value={purchasePrice} onChange={(e) => setPurchasePrice(e.target.value)}
                            className="field-input field-input-sm" placeholder="¥/件" />
                    </div>
                    <div>
                        <label className="field-label">实时汇率</label>
                        <input type="number" step="0.01" value={exchangeRate} onChange={(e) => setExchangeRate(e.target.value)}
                            className="field-input field-input-sm" placeholder="CNY/USD" />
                    </div>
                    <div>
                        <label className="field-label">利润倍率</label>
                        <input type="number" step="0.1" value={profitMultiplier} onChange={(e) => setProfitMultiplier(e.target.value)}
                            className="field-input field-input-sm" placeholder="倍" />
                    </div>
                </div>

                {!hasPurchase ? (
                    <div className="rounded-lg p-4 text-center" style={{background: 'var(--bg)', border: '1.5px dashed var(--line)'}}>
                        <div className="text-xs font-medium" style={{color: 'var(--ink-3)'}}>
                            填写「采购单价」后自动推演卖价
                        </div>
                    </div>
                ) : (
                    <>
                        {/* 成本明细 */}
                        <div className="rounded-lg p-3 mb-3 text-[11px]" style={{background: 'var(--bg)', border: '1px solid var(--line-soft)'}}>
                            <div className="text-[10px] font-bold uppercase tracking-wider mb-2" style={{color: 'var(--ink-3)'}}>
                                成本构成（按推荐方案 · {recLabel}）
                            </div>
                            <div className="space-y-1 font-mono">
                                <div className="flex justify-between">
                                    <span style={{color: 'var(--ink-2)'}}>· 总产品成本（¥{sp.unitCost.toFixed(2)} × {totalQty}件）</span>
                                    <span className="font-bold" style={{color: 'var(--ink)'}}>¥{Math.round(sp.totalProductCost).toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span style={{color: 'var(--ink-2)'}}>· 推演运费</span>
                                    <span className="font-bold" style={{color: 'var(--ink)'}}>¥{Math.round(sp.recShippingCost).toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span style={{color: 'var(--ink-2)'}}>· 木箱材料 + 人工{sp.crateBreakdown.length > 0 ? ` (${sp.crateBreakdown.reduce((s, c) => s + c.count, 0)}个木箱)` : ''}</span>
                                    <span className="font-bold" style={{color: 'var(--ink)'}}>¥{Math.round(sp.totalCrateCost).toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between pt-1 mt-1 border-t" style={{borderColor: 'var(--line-soft)'}}>
                                    <span className="font-bold" style={{color: 'var(--ink)'}}>合计成本</span>
                                    <span className="font-bold" style={{color: 'var(--ink)'}}>¥{Math.round(sp.totalCostCNY).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>

                        {/* 卖价显示 */}
                        <div className="rounded-xl p-5 relative overflow-hidden" style={{background: 'linear-gradient(135deg, #047857 0%, #0d9488 100%)', color: 'white'}}>
                            <div className="flex items-center justify-between mb-3">
                                <div className="text-[10px] font-bold uppercase tracking-widest opacity-80">
                                    建议总售价 (USD)
                                </div>
                                <span className="font-mono text-[10px] font-bold uppercase tracking-widest opacity-70">
                                    × {sp.multiplier} ÷ {sp.rate}
                                </span>
                            </div>
                            <div className="display-num text-5xl tracking-tighter">
                                ${sp.totalSellingUSD.toFixed(2)}
                            </div>
                            <div className="mt-3 flex items-end justify-between border-t pt-3" style={{borderColor: 'rgba(255,255,255,0.2)'}}>
                                <div>
                                    <div className="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1">
                                        单件均价
                                    </div>
                                    <div className="font-mono font-bold text-2xl">
                                        ${sp.unitSellingUSD.toFixed(2)}
                                        <span className="text-[10px] opacity-70 ml-2">/件</span>
                                    </div>
                                </div>
                                <div className="text-right text-[10px] font-mono opacity-70 leading-relaxed">
                                    公式: (产品+运费+木箱)<br/>
                                    × {sp.multiplier} ÷ {sp.rate} = USD
                                </div>
                            </div>
                        </div>

                        {/* 财务核算用提示 */}
                        <div className="mt-3 text-[10px] font-medium flex items-start gap-1.5" style={{color: 'var(--ink-3)'}}>
                            <Icon name="info" className="w-3 h-3 flex-shrink-0 mt-0.5" />
                            <span>财务可输入实际采购价 + 当前汇率 + 利润倍率，核算业务报价是否合理。木箱材料费按表面积 m² × ¥44/m² 计算。</span>
                        </div>
                    </>
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
