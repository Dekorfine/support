<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合箱智能规划器 · Consolidation Planner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f4f1ea;
            --bg-warm: #faf8f3;
            --paper: #ffffff;
            --ink: #1a1815;
            --ink-2: #3f3a33;
            --ink-3: #6b6259;
            --ink-4: #a8a29e;
            --line: #d8d3c8;
            --line-soft: #e8e4dc;
            --accent: #b8462e;
            --accent-2: #d4694e;
            --accent-soft: #fbe9e1;
            --good: #166534;
            --good-soft: #dcfce7;
            --good-line: #86efac;
            --warn: #92400e;
            --warn-soft: #fef3c7;
            --warn-line: #fbbf24;
            --bad: #991b1b;
            --bad-soft: #fee2e2;
            --bad-line: #fca5a5;
            --ydng: #1e293b;
            --ydng-2: #f59e0b;
        }

        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg);
            color: var(--ink);
            font-feature-settings: 'cv11', 'ss01', 'ss03', 'tnum';
        }

        .font-display {
            font-family: 'Bricolage Grotesque', 'Noto Serif SC', serif;
            letter-spacing: -0.02em;
        }
        .font-serif-cn {
            font-family: 'Noto Serif SC', 'Songti SC', serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
            font-variant-numeric: tabular-nums;
        }
        .tnum { font-variant-numeric: tabular-nums; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Subtle paper grain */
        .paper {
            background: var(--paper);
            background-image:
              radial-gradient(circle at 10% 20%, rgba(184,70,46,0.015) 0%, transparent 50%),
              radial-gradient(circle at 90% 80%, rgba(184,70,46,0.008) 0%, transparent 60%);
        }
        .paper-warm { background: var(--bg-warm); }

        /* Top rule */
        .top-rule {
            background: var(--ink);
            color: var(--bg);
            border-bottom: 3px double var(--ink);
        }

        /* Display number */
        .display-num {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            line-height: 0.95;
        }

        /* Input style */
        .field-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-3);
        }
        .field-input {
            width: 100%;
            background: transparent;
            border: 0;
            border-bottom: 1.5px solid var(--line);
            padding: 8px 0 6px;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            transition: border-color 0.2s;
            font-variant-numeric: tabular-nums;
            font-family: 'JetBrains Mono', monospace;
        }
        .field-input:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }
        .field-input::placeholder { color: var(--ink-4); font-weight: 500; }

        .field-input-sm {
            font-size: 16px;
            padding: 6px 0 4px;
        }

        /* Pill toggle */
        .pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            background: var(--bg);
            border: 1.5px solid var(--line);
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--ink-2);
        }
        .pill:hover { border-color: var(--ink-3); }
        .pill.active {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
        }

        /* Status chip */
        .chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .chip-good { background: var(--good-soft); color: var(--good); border: 1px solid var(--good-line); }
        .chip-warn { background: var(--warn-soft); color: var(--warn); border: 1px solid var(--warn-line); }
        .chip-bad  { background: var(--bad-soft); color: var(--bad); border: 1px solid var(--bad-line); }
        .chip-neutral { background: var(--bg); color: var(--ink-3); border: 1px solid var(--line); }

        /* Recommendation hero */
        .verdict-card {
            position: relative;
            overflow: hidden;
        }
        .verdict-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
              repeating-linear-gradient(45deg, transparent, transparent 28px, rgba(0,0,0,0.025) 28px, rgba(0,0,0,0.025) 29px);
            pointer-events: none;
        }
        .verdict-pin {
            position: absolute;
            top: -12px;
            left: 28px;
            width: 24px; height: 24px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(184,70,46,0.4), inset 0 -3px 0 rgba(0,0,0,0.2);
        }

        /* Plan card */
        .plan-card {
            background: var(--paper);
            border: 1.5px solid var(--line-soft);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .plan-card.best {
            border-color: var(--ink);
            box-shadow: 0 8px 24px -8px rgba(26,24,21,0.25), 0 0 0 4px rgba(184,70,46,0.08);
        }
        .plan-card.disabled { opacity: 0.5; }

        /* Box visualization */
        .box-viz {
            display: inline-block;
            padding: 4px 8px;
            background: var(--bg);
            border: 1px dashed var(--line);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            color: var(--ink-2);
        }

        /* Number ticker */
        .num-ticker {
            display: flex;
            align-items: baseline;
            gap: 4px;
            font-variant-numeric: tabular-nums;
        }

        /* Dotted divider */
        .dotted-div {
            border-top: 1.5px dotted var(--line);
            margin: 16px 0;
        }

        /* Big stat */
        .big-stat-num {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: 44px;
            line-height: 1;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-fadeup { animation: fadeUp 0.4s ease-out both; }

        @keyframes pulse-soft {
            0%, 100% { box-shadow: 0 0 0 0 rgba(184,70,46,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(184,70,46,0); }
        }
        .pulse-dot { animation: pulse-soft 2s infinite; }

        /* Stamp */
        .stamp {
            display: inline-block;
            padding: 6px 16px;
            border: 2.5px solid currentColor;
            border-radius: 6px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transform: rotate(-2deg);
            font-size: 12px;
        }

        .nav-link {
            color: var(--ink-4);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.15s;
        }
        .nav-link:hover { color: var(--bg); }

        .save-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 700; color: #86efac;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.05em;
        }
        .save-badge::before {
            content: ''; width: 6px; height: 6px;
            background: #86efac; border-radius: 50%;
            box-shadow: 0 0 0 0 #86efac;
            animation: pulse-soft 2s infinite;
        }

        .btn-action {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 6px;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.05em; text-transform: uppercase;
            cursor: pointer; transition: all 0.15s;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--ink-4);
            font-family: inherit;
        }
        .btn-action:hover { color: var(--bg); border-color: rgba(255,255,255,0.4); }

        /* Boxed metric */
        .metric-box {
            border: 1.5px solid var(--line);
            border-radius: 8px;
            padding: 12px 14px;
            background: var(--paper);
            transition: all 0.15s;
        }
        .metric-box.good { border-color: var(--good); background: var(--good-soft); }
        .metric-box.warn { border-color: var(--warn-line); background: var(--warn-soft); }
        .metric-box.bad  { border-color: var(--bad-line); background: var(--bad-soft); }

        /* Decorative corner mark */
        .corner-mark::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 16px; height: 16px;
            border-top: 2px solid var(--ink);
            border-left: 2px solid var(--ink);
        }
        .corner-mark::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 16px; height: 16px;
            border-bottom: 2px solid var(--ink);
            border-right: 2px solid var(--ink);
        }

        /* Smooth scroll */
        html { scroll-behavior: smooth; }

        /* Hide scrollbar polish */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }
    </style>
</head>

    // base = 起步价 (≤5kg)，extra = 续重 5-12kg/kg，mid = 12-101kg/kg，heavy = ≥101kg/kg
    const REGION_RATES = {
        east: { label: '美东', base: 165, extra: 17, mid: 21, heavy: 18 },
        mid:  { label: '美中', base: 145, extra: 15, mid: 20, heavy: 17 },
        west: { label: '美西', base: 135, extra: 14, mid: 19, heavy: 16 },
    };

    const RATES = {
        regularMinKg: 12,       // 加班船多件最低 12kg/件
        yundingPerKg: 20,       // 云鼎卡车参考价
        yundingDelivery: 500,   // 云鼎派送费
        yundingMinKg: 101,      // 云鼎起收（说明用）
    };

    const PACK_BUFFER = 2;       // 普通纸箱缓冲
    const CRATE_BUFFER = 5;      // 木箱缓冲

    // 计算常规渠道运费（含公式文本）- 仅作辅助显示，主用 calcBoxByCarrier
    const calcRegularFreight = (billW, region) => {
        const r = REGION_RATES[region] || REGION_RATES.east;
        let freight, formula;
        if (billW >= 101) {
            freight = billW * r.heavy;
            formula = `${billW}kg × ¥${r.heavy}/kg (重货 ≥101kg)`;
        } else if (billW >= 12) {
            freight = billW * r.mid;
            formula = `${billW}kg × ¥${r.mid}/kg (12-101kg 段)`;
        } else {
            const w = Math.max(billW, 5);
            freight = r.base + (w - 5) * r.extra;
            formula = `¥${r.base}(5kg起) + (${w}-5) × ¥${r.extra}/kg`;
        }
        return { freight, formula, rate: r };

    // 中国邮政国际航空包裹（7折）
    // 计算逻辑：每件单独计费。起重1kg + 续重每1kg向上取整
    const calcCarrierCNAir = (boxes, opts) => {
        const targetCN = opts.targetCN || 'X';
        const rate = INTL_AIR_RATES[targetCN];
        const discount = opts.cnAirDiscount || 0.7;  // 7折

        }
        let totalCost = 0, totalBW = 0, anyOverWeight = false, anyOverSize = false;
        // 尺寸类限制
        const sizeLimits = {1:{ side:200, perimSum:300 }, 2:{ side:150, perimSum:300 }, 3:{ side:105, perimSum:200 }};
        const lim = sizeLimits[rate.c] || sizeLimits[3];
        boxes.forEach(box => {
            // split model: 体积重用产品尺寸，尺寸类检查用包装尺寸
            const sBuf = box.surchargeBuffer || 0;
            const checkDims = sBuf > 0 ? [box.dims[0]+sBuf, box.dims[1]+sBuf, box.dims[2]+sBuf] : box.dims;
            const sides = [...checkDims].sort((a,b) => b-a);
            const perimeterSum = sides[0] + 2 * (sides[1] + sides[2]);  // 长 + 横周

            let actualW = Math.max((box.dims[0]*box.dims[1]*box.dims[2])/6000, box.weight || 0);

            if (sides[0] > lim.side || perimeterSum > lim.perimSum) anyOverSize = true;

            let perPiece;
            if (actualW <= 1) perPiece = rate.s;
            else perPiece = rate.s + Math.ceil(actualW - 1) * rate.p;
            perPiece *= discount;  // 7折
            totalBW += actualW * box.qty;
            totalCost += perPiece * box.qty;
        });
        const surList = [];
        if (anyOverWeight) surList.push({ name: `⚠超 ${rate.m}kg 限重，可能拒收`, cost: 0 });

            valid: !(anyOverWeight || anyOverSize),
            invalidReason: anyOverWeight ? `超 ${rate.m}kg 限重` : (anyOverSize ? `超第${rate.c}类尺寸` : null),

            else if (sides[0] >= 200) addSur('长边≥200cm', 200);
            if (sides[1] > 75) addSur('二边>75cm', 100);
            if (weight >= 22) addSur('实重≥22kg', 100);
            if (girth > 266 && girth < 320) addSur('围长266-320cm', 100);
            else if (girth >= 320) addSur('围长≥320cm', 600);
        } else if (carrierId === 'zs') {
            // 正石不收木箱费，附加费按最高项
            const dimSurs = [];
            if (sides[0] >= 120) dimSurs.push(80);
            if (sides[1] >= 76) dimSurs.push(80);
            if (girth >= 263 && girth < 326) dimSurs.push(80);
            if (sides[0] >= 240 || girth >= 326) dimSurs.push(500);
            if (dimSurs.length > 0) addSur('尺寸类最高项', Math.max(...dimSurs));
            if (weight >= 40) addSur('实重附加费', 500);
            else if (weight >= 21) addSur('实重附加费', 80);
        }

        return {
            carrierId,
            name: US_CARRIERS[carrierId].name,
            freight: baseCost,
            billWeight: bw,
            formula,
            surcharges,
            totalCost: baseCost + surcharges.total
        };
    };

    // 为一组箱评估所有承运商，返回最便宜的（按国家分派）
    // boxes = [{ dims, weight, qty, isCrate }]
    const evaluateAllCarriers = (boxes, region, country, opts = {}) => {
        if (!boxes || boxes.length === 0) return null;
        const totalQty = boxes.reduce((s, b) => s + b.qty, 0);
        const isMulti = totalQty > 1;
        let results = [];

        if (country === 'US') {
            const ids = isMulti ? ['ch', 'my', 'zs'] : ['ch', 'ch_small', 'my', 'my_small', 'zs'];
            results = ids.map(id => {
                let total = 0;
                const boxDetails = [];
                boxes.forEach(box => {
                    const r = calcBoxByCarrier(id, box.dims, box.weight, !!box.isCrate, region, isMulti, box.surchargeBuffer || 0);
                    boxDetails.push({ ...box, result: r });
                    total += r.totalCost * box.qty;
                });
                return { carrierId: id, name: US_CARRIERS[id].name, totalCost: total, boxDetails, valid: true, billWeight: boxDetails.reduce((s, d) => s + d.result.billWeight * d.qty, 0) };
            });
        } else if (country === 'CA') {
            results = [
                calcCarrierCAXY(boxes, opts),
                calcCarrierCAHC(boxes, opts),
                calcCarrierCAZS(boxes, opts)
            ];
        } else if (country === 'AU') {
            results = [calcCarrierAU(boxes, opts)];
        } else if (country === 'ME') {
            results = [
                calcCarrierUAE(boxes, opts),
                calcCarrierSA(boxes, opts),
                calcCarrierUAEAir(boxes, opts),
                calcCarrierSAAir(boxes, opts)
            ];
        }

        // 所有国家：追加 中国邮政国际航空包裹 + EMS 两个渠道
        const targetCN = opts.targetCN || COUNTRY_CN_MAP[country];
        if (targetCN) {
            results.push(calcCarrierCNAir(boxes, { ...opts, targetCN }));
            results.push(calcCarrierCNEMS(boxes, { ...opts, targetCN }));
        }

        const validResults = results.filter(r => r.valid !== false);
        validResults.sort((a, b) => a.totalCost - b.totalCost);
        return { best: validResults[0] || null, all: results, isMulti, country, targetCN };
    };

    // === 工具函数 ===
    // 内联 SVG 图标库（零依赖、立即渲染、永不出错）
    const ICON_PATHS = {
        'check': 'M20 6 9 17l-5-5',
        'x': 'M18 6 6 18M6 6l12 12',
        'x-circle': 'M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z M15 9l-6 6 M9 9l6 6',
        'alert-circle': 'M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z M12 8v4 M12 16h.01',
        'alert-triangle': 'm21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z M12 9v4 M12 17h.01',
        'info': 'M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z M12 16v-4 M12 8h.01',
        'package': 'm7.5 4.27 9 5.15 M21 8 12 13 3 8l9-5 9 5v8l-9 5-9-5V8Z M3.27 6.96 12 12.01l8.73-5.05 M12 22.08V12',
        'package-plus': 'M16 16h6 M19 13v6 M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14 M16.5 9.4 7.55 4.24 M3.29 7 12 12l8.71-5 M12 22V12',
        'package-search': 'M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l1-.55 M16.5 9.4 7.55 4.24 M3.29 7 12 12l8.71-5 M12 22V12 M18.5 21a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5 M22 22l-1.9-1.9',
        'boxes': 'M2.97 12.92A2 2 0 0 0 2 14.63v3.24a2 2 0 0 0 .97 1.71l3 1.8a2 2 0 0 0 2.06 0L12 19v-5.5l-5-3-4.03 2.42Z M7 16.5l-4.74-2.85 M7 16.5l5-3 M7 16.5v5.17 M12 13.5V19l3.97 2.38a2 2 0 0 0 2.06 0l3-1.8a2 2 0 0 0 .97-1.71v-3.24a2 2 0 0 0-.97-1.71L17 10.5l-5 3Z M17 16.5l-5-3 M17 16.5l4.74-2.85 M17 16.5v5.17 M7.97 4.42A2 2 0 0 0 7 6.13v4.37l5 3 5-3V6.13a2 2 0 0 0-.97-1.71l-3-1.8a2 2 0 0 0-2.06 0l-3 1.8Z M12 8 7.26 5.15 M12 8l4.74-2.85 M12 13.5V8',

        'truck': 'M5 18H3c-.6 0-1-.4-1-1V7c0-.6.4-1 1-1h10c.6 0 1 .4 1 1v11 M14 9h4l4 4v4c0 .6-.4 1-1 1h-2 M7 22a2 2 0 1 0 0-4 2 2 0 0 0 0 4 M17 22a2 2 0 1 0 0-4 2 2 0 0 0 0 4',
        'package-2': 'M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9 M3 9l2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9 M12 3v6',
        'lamp-ceiling': 'M12 2v5 M6 7h12l4 9H2l4-9Z M9.17 16a3 3 0 1 0 5.66 0',
    };

    const Icon = ({ name, className = "w-4 h-4", style = {} }) => {
        const path = ICON_PATHS[name];
        if (!path) return null;
        const paths = path.split(' M').map((d, i) => i === 0 ? d : 'M' + d);
        return (
            <svg
                className={className}
                style={style}
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
                xmlns="http://www.w3.org/2000/svg"
            >
                {paths.map((d, i) => <path key={i} d={d} />)}
            </svg>
        );
    };

    const dimAnalysis = (l, w, h, weight) => {
        const sides = [+l, +w, +h].sort((a, b) => b - a);
        const longest = sides[0];
        const second = sides[1];
        const third = sides[2];
        const girth = longest + 2 * (second + third);
        const volume = l * w * h;
        const volWeight = volume / 6000;
        const billWeight = Math.max(volWeight, weight);
        return { longest, second, third, girth, volume, volWeight, billWeight };
    };

    const checkRegular = (longest, second, girth, weight) => {
        const errors = [];
        if (longest > LIMITS.longestMax) errors.push(`最长边 ${longest.toFixed(1)} > ${LIMITS.longestMax}cm`);
        if (second > LIMITS.secondMax) errors.push(`第二边 ${second.toFixed(1)} > ${LIMITS.secondMax}cm`);
        if (weight > LIMITS.weightMax) errors.push(`实重 ${weight.toFixed(1)} > ${LIMITS.weightMax}kg`);
        if (girth > LIMITS.girthMax) errors.push(`围长 ${girth.toFixed(1)} > ${LIMITS.girthMax}cm`);
        return { ok: errors.length === 0, errors };
    };

    const calcSurcharges = ({ longest, second, girth, weight, useCrate }) => {
        let total = 0;
        const list = [];
        if (longest > LIMITS.longestMax) {
            total += SURCHARGES.longestOver;
            list.push({ name: '最长边>120cm', cost: SURCHARGES.longestOver });
        }
        if (second > LIMITS.secondMax) {
            total += SURCHARGES.secondOver;
            list.push({ name: '第二边>75cm', cost: SURCHARGES.secondOver });
        }
        if (weight > LIMITS.weightHardMax) {
            total += SURCHARGES.weightOver40;
            list.push({ name: '实重>40kg', cost: SURCHARGES.weightOver40 });
        } else if (weight > LIMITS.weightMax) {
            total += SURCHARGES.weight22_40;
            list.push({ name: '实重22-40kg', cost: SURCHARGES.weight22_40 });
        }
        if (girth > LIMITS.girthHardMax) {
            total += SURCHARGES.girthOver320;
            list.push({ name: '围长>320cm', cost: SURCHARGES.girthOver320 });
        } else if (girth > LIMITS.girthMax) {
            total += SURCHARGES.girth265_320;
            list.push({ name: '围长265-320cm', cost: SURCHARGES.girth265_320 });
        }
        if (useCrate) {
            total += SURCHARGES.cratePerBox;
            list.push({ name: '木箱费', cost: SURCHARGES.cratePerBox });
        }
        return { total, list };
    };

    const calcBoxFreight = (dims, weight, useCrate, region) => {
        const [L, W, H] = dims;
        const ana = dimAnalysis(L, W, H, weight);
        const billW = Math.ceil(Math.max(ana.billWeight, 5));
        const sur = calcSurcharges({
            longest: ana.longest, second: ana.second, girth: ana.girth, weight, useCrate
        });
        const fr = calcRegularFreight(billW, region);
        return {
            freight: fr.freight,
            formula: fr.formula,
            billWeight: billW,
            surcharges: sur,
            totalCost: fr.freight + sur.total,
            ...ana
        };
    };

    // === 智能合箱规划 ===
    const findBestConsolidation = (l, w, h, weight, useCrate, qty, region) => {
        const buffer = useCrate ? CRATE_BUFFER : PACK_BUFFER;
        // 排序：小、中、大
        const sortedU = [+l + buffer, +w + buffer, +h + buffer].sort((a, b) => a - b);
        const [uS, uM, uL] = sortedU;

        // 单件是否本身已超规
        const singleLongest = Math.max(l, w, h);
        const isLengthExempt = singleLongest >= LIMITS.longestMax;

        const checkLayout = (nx, ny, nz, totalA) => {
            const dims = [uS * nx, uM * ny, uL * nz].sort((a, b) => b - a);
            const girth = dims[0] + 2 * (dims[1] + dims[2]);
            const fits = checkRegular(dims[0], dims[1], girth, totalA);
            // 已超长豁免：单件已超120的，长边可以不受120约束（继承）
            if (isLengthExempt && fits.errors.length > 0) {
                fits.errors = fits.errors.filter(e => !e.includes('最长边'));
                fits.ok = fits.errors.length === 0;
            }
            return { dims, girth, fits };
        };

        const plans = {};
        // 单件
        const singleCheck = checkLayout(1, 1, 1, +weight);
        plans[1] = { n: 1, ...singleCheck };

        // 限制：合箱后总重不超过 LIMITS.weightMax （除非豁免，最大40kg）
        // 但我们允许合箱到40kg硬上限，超过附加费再说
        const maxByWeight = weight > 0 ? Math.floor(40 / weight) : qty;
        const maxN = Math.min(qty, maxByWeight, 100);

        for (let n = 2; n <= maxN; n++) {
            let bestForN = null;
            for (let nx = 1; nx <= n; nx++) {
                if (n % nx !== 0) continue;
                const r = n / nx;
                for (let ny = 1; ny <= r; ny++) {
                    if (r % ny !== 0) continue;
                    const nz = r / ny;
                    const totalA = weight * n;
                    const res = checkLayout(nx, ny, nz, totalA);
                    // 选择长边最短的合法方案
                    if (res.fits.ok && (!bestForN || res.dims[0] < bestForN.dims[0] || 
                        (res.dims[0] === bestForN.dims[0] && res.girth < bestForN.girth))) {
                        bestForN = { n, ...res, layout: `${nx}×${ny}×${nz}` };
                    }
                }
            }
            if (bestForN) plans[n] = bestForN;
        }

        // 找最大可合箱数
        let maxValidN = 0;
        for (let n = qty; n >= 1; n--) {
            if (plans[n] && plans[n].fits && plans[n].fits.ok) {
                maxValidN = n;
                break;
            }
        }

        if (maxValidN === 0) {
            // 即使单件也不符合规则
            return { 
                canConsolidate: false, 
                singleFits: false,
                singleErrors: plans[1].fits.errors,
                isLengthExempt
            };
        }

        // === 平衡分配算法 ===
        // 例: qty=5, maxValidN=4
        //   贪心算法: 4+1 (4件1箱 + 1件1箱)
        //   平衡算法: 3+2 (3件1箱 + 2件1箱) — 重量更均匀，运输/打包更便利
        // 算法: numBoxes = ceil(qty/maxValidN), 然后把 qty 平均分到 numBoxes 个箱
        const numBoxes = Math.ceil(qty / maxValidN);
        const baseCount = Math.floor(qty / numBoxes);
        const extraCount = qty % numBoxes; // 前 extraCount 个箱多 1 件

        // 计算每个箱的件数分布
        const boxes = [];
        for (let i = 0; i < numBoxes; i++) {
            const count = i < extraCount ? baseCount + 1 : baseCount;
            if (!plans[count] || !plans[count].fits || !plans[count].fits.ok) continue; // 兜底
            boxes.push({
                count,
                plan: plans[count],
                cost: calcBoxFreight(plans[count].dims, weight * count, useCrate, region)
            });
        }

        const totalFreight = boxes.reduce((s, b) => s + b.cost.totalCost, 0);

        // 按 count 分组聚合（相同件数的箱合并显示）
        const grouped = {};
        boxes.forEach(b => {
            const key = b.count;
            if (!grouped[key]) grouped[key] = { count: b.count, plan: b.plan, cost: b.cost, n: 0 };
            grouped[key].n += 1;
        });
        const groupList = Object.values(grouped).sort((a, b) => b.count - a.count);

        return {
            canConsolidate: true,
            isLengthExempt,
            maxValidN,
            numBoxes,
            boxes,           // 每个箱的明细
            groupList,       // 按件数聚合（如 [{count:3, n:1}, {count:2, n:1}]）
            totalBoxes: numBoxes,
            totalFreight,
            plans
        };
    };

    // === 高度拆分算法（适用于超大件）===
    // 用户业务约束：长宽是固定的（产品物理尺寸），只有高度 H 可以拆分
    // 例如 80×80×80 → 80×80×40（拆 1 件 → 2 件）
    const findBestHeightSplit = (l, w, h, weight, useCrate, qty, region) => {
        let bestN = 1;
        let bestCost = Infinity;
        const trials = [];

        // 尝试 N=1 (不拆) 到 N=6 (拆成 6 份)
        for (let N = 1; N <= 6; N++) {
            const newH = h / N;
            const newWeight = weight / N;
            const subCost = calcBoxFreight([l, w, newH], newWeight, useCrate, region);
            const totalFreight = subCost.totalCost * qty * N;
            const subAna = dimAnalysis(l, w, newH, newWeight);
            const subCheck = checkRegular(subAna.longest, subAna.second, subAna.girth, newWeight);
            trials.push({
                N, newH, newWeight, subCost, totalFreight,
                fitsStrict: subCheck.ok,
                errors: subCheck.errors
            });
            if (totalFreight < bestCost) {
                bestCost = totalFreight;
                bestN = N;
            }
        }

        const best = trials.find(t => t.N === bestN);
        return {
            bestN,
            bestCost,
            trials,
            origDims: [l, w, h],
            origWeight: weight,
            origQty: qty,
            newDims: [l, w, best.newH],
            newWeight: best.newWeight,
            totalSubPkgs: qty * bestN,
            subCost: best.subCost,
            totalFreight: best.totalFreight,
            isSplit: bestN > 1,
            fitsAfterSplit: best.fitsStrict
        };
    };

    // === 主应用 ===
    const App = () => {
        // 多包装数组：每个包装独立尺寸/重量/数量/纸箱木箱
        const [packages, setPackages] = useState([
            { id: 1, l: '', w: '', h: '', weight: '', qty: '1', isCrate: false, forceSingleBox: false }
        ]);
        const [glassLamp, setGlassLamp] = useState(false);
        const [targetCN, setTargetCN] = useState('美国');  // 目的国（中文名）
        const country = CN_TO_REGION[targetCN] || null;  // 衍生区域（4 主区或 null=仅中邮）
        const [region, setRegion] = useState('east'); // US 分区：east/mid/west
        const [auZip, setAuZip] = useState('3000'); // 澳洲邮编
        const [isRemoteCA, setIsRemoteCA] = useState(false); // 加拿大偏远地区
        // 卖价推演相关
        const [purchasePrice, setPurchasePrice] = useState(''); // 采购单价（元/件）
        const [exchangeRate, setExchangeRate] = useState('7.2'); // CNY → USD
        const [profitMultiplier, setProfitMultiplier] = useState('2.4'); // 利润倍率

        const SAVE_KEY = 'consolidationCalc_v3';

        const addPackage = () => {
            setPackages([...packages, {
                id: Date.now() + Math.random(),
                l: '', w: '', h: '', weight: '', qty: '1', isCrate: false, forceSingleBox: false
            }]);
        };

        const removePackage = (id) => {
            if (packages.length > 1) {
                setPackages(packages.filter(p => p.id !== id));
            }
        };

        const updatePkg = (id, field, value) => {
            setPackages(packages.map(p => p.id === id ? { ...p, [field]: value } : p));
        };

        const togglePkgCrate = (id, isCrate) => {
            setPackages(packages.map(p => p.id === id ? { ...p, isCrate } : p));
        };

        // 从 localStorage 恢复
        useEffect(() => {
            try {
                const saved = localStorage.getItem(SAVE_KEY);
                if (!saved) return;
                const s = JSON.parse(saved);
                if (Array.isArray(s.packages) && s.packages.length > 0) setPackages(s.packages);
                if (s.glassLamp !== undefined) setGlassLamp(s.glassLamp);
                if (s.targetCN !== undefined) setTargetCN(s.targetCN);
                else if (s.country !== undefined) {
                    // 兼容老版本：country 是 'US'/'CA'/'AU'/'ME'
                    setTargetCN(COUNTRY_CN_MAP[s.country] || '美国');
                }
                if (s.region !== undefined) setRegion(s.region);
                if (s.auZip !== undefined) setAuZip(s.auZip);
                if (s.isRemoteCA !== undefined) setIsRemoteCA(s.isRemoteCA);
                if (s.purchasePrice !== undefined) setPurchasePrice(s.purchasePrice);
                if (s.exchangeRate !== undefined) setExchangeRate(s.exchangeRate);
                if (s.profitMultiplier !== undefined) setProfitMultiplier(s.profitMultiplier);
            } catch (e) {}
        }, []);

        // 自动保存
        useEffect(() => {
            const t = setTimeout(() => {
                try {
                    localStorage.setItem(SAVE_KEY, JSON.stringify({
                        packages, glassLamp, targetCN, region, auZip, isRemoteCA,
                        purchasePrice, exchangeRate, profitMultiplier
                    }));
                } catch (e) {}
            }, 500);
            return () => clearTimeout(t);
        }, [packages, glassLamp, targetCN, region, auZip, isRemoteCA, purchasePrice, exchangeRate, profitMultiplier]);

        // === 有效包装（已填完整字段）===
        const validPackages = useMemo(() => {
            return packages.filter(p =>
                parseFloat(p.l) > 0 && parseFloat(p.w) > 0 && parseFloat(p.h) > 0 &&
                parseInt(p.qty) > 0
            ).map(p => ({
                ...p,
                l: parseFloat(p.l),
                w: parseFloat(p.w),
                h: parseFloat(p.h),
                weight: parseFloat(p.weight) || 0,  // 重量可选，空值按 0 处理（按体积重计）
                qty: parseInt(p.qty)
            }));
        }, [packages]);

        const hasInput = validPackages.length > 0;
        const totalQty = validPackages.reduce((s, p) => s + p.qty, 0);
        const totalWeight = validPackages.reduce((s, p) => s + p.weight * p.qty, 0);

        // 只在大件才建议填写重量（围长≥265cm 或 长边≥120cm 时影响附加费判定）
        const suggestWeightIds = packages
            .filter(p => {
                const l = parseFloat(p.l), w = parseFloat(p.w), h = parseFloat(p.h);
                if (!(l > 0 && w > 0 && h > 0)) return false;
                if (parseFloat(p.weight) > 0) return false;  // 已填写就不提示
                const sides = [l, w, h].sort((a, b) => b - a);
                const girth = sides[0] + 2 * (sides[1] + sides[2]);
                // 触发条件：围长≥265 或 长边≥120 或 体积重≥22kg
                const volWeight = (l * w * h) / 6000;
                return girth >= 265 || sides[0] >= 120 || volWeight >= 22;
            })
            .map(p => p.id);

        // === 每个包装的实时分析 ===
        const packageAnalyses = useMemo(() => {
            return validPackages.map(p => {
                const dim = dimAnalysis(p.l, p.w, p.h, p.weight);
                const check = checkRegular(dim.longest, dim.second, dim.girth, p.weight);
                const sur = calcSurcharges({
                    longest: dim.longest, second: dim.second, girth: dim.girth,
                    weight: p.weight, useCrate: p.isCrate
                });
                return { ...p, dim, check, sur };
            });
        }, [validPackages]);

        // === 方案 A: 拆分发货（即原箱发货）===
        const planSplit = useMemo(() => {
            if (!hasInput) return null;
            // 构建箱列表 - dims 是产品(报关)尺寸；surchargeBuffer 用于附加费判定（包装尺寸 = 产品 + 缓冲）
            const boxes = packageAnalyses.map(p => ({
                dims: [p.l, p.w, p.h],
                surchargeBuffer: p.isCrate ? CRATE_BUFFER : PACK_BUFFER,
                weight: p.weight,
                qty: p.qty,
                isCrate: p.isCrate,
                groupId: p.id
            }));
            const carriersEval = evaluateAllCarriers(boxes, region, country, { zip: auZip, isRemote: isRemoteCA, targetCN });

            let totalBoxes = 0;
            const breakdown = [];
            packageAnalyses.forEach(p => {
                const detail = carriersEval.best && carriersEval.best.boxDetails && carriersEval.best.boxDetails.find(b => b.groupId === p.id);
                totalBoxes += p.qty;
                if (detail) {
                    breakdown.push({
                        ...p,
                        billW: detail.result.billWeight,
                        perFreight: detail.result.freight,
                        formula: detail.result.formula,
                        perSurcharges: detail.result.surcharges.total,
                        perTotal: detail.result.totalCost,
                        groupTotal: detail.result.totalCost * p.qty,
                        sur: detail.result.surcharges
                    });
                } else {
                    // 非美国国家没有 boxDetails，只展示包装信息
                    breakdown.push({
                        ...p, billW: 0, perFreight: 0, formula: '', perSurcharges: 0,
                        perTotal: 0, groupTotal: 0, sur: { list: [], total: 0 }
                    });
                }
            });
            return {
                totalCost: carriersEval.best ? carriersEval.best.totalCost : 0,
                totalBoxes, breakdown,
                bestCarrier: carriersEval.best,
                allCarriers: carriersEval.all
            };
        }, [packageAnalyses, hasInput, region, country, auZip, isRemoteCA, targetCN]);

        // === 方案 B: 智能优化（小件合箱 + 超大件高度拆分 + 多承运商比价）===
        const planConsol = useMemo(() => {
            if (!hasInput) return null;
            const groupPlans = packageAnalyses.map(p => {
                // 优先尝试合箱（findBestConsolidation 内部有 isLengthExempt 处理超长件）
                const consol = findBestConsolidation(p.l, p.w, p.h, p.weight, p.isCrate, p.qty, region);

                // 强制单件装箱：用户手动选择 1件/箱（覆盖系统合箱）
                if (p.forceSingleBox && consol.canConsolidate && consol.maxValidN > 1) {
                    // 重新生成单件方案
                    const singleCost = calcBoxFreight([p.l + (p.isCrate ? CRATE_BUFFER : PACK_BUFFER), p.w + (p.isCrate ? CRATE_BUFFER : PACK_BUFFER), p.h + (p.isCrate ? CRATE_BUFFER : PACK_BUFFER)], p.weight, p.isCrate, region);
                    consol.maxValidN = 1;
                    consol.numBoxes = p.qty;
                    consol.totalBoxes = p.qty;
                    consol.boxes = Array(p.qty).fill(null).map(() => ({ count: 1, plan: consol.plans[1], cost: singleCost }));
                    consol.groupList = [{ count: 1, plan: consol.plans[1], cost: singleCost, n: p.qty }];
                    consol.totalFreight = singleCost.totalCost * p.qty;
                    consol.forcedSingle = true;
                }

                if (consol.canConsolidate) {
                    // 合箱方案可行（包含 isLengthExempt 豁免情况）
                    return { ...p, strategy: 'consol', consol, isOversized: !p.check.ok };
                }

                // 合箱完全失败 → 走高度拆分
                const heightSplit = findBestHeightSplit(p.l, p.w, p.h, p.weight, p.isCrate, p.qty, region);
                return { ...p, strategy: 'heightSplit', heightSplit, isOversized: true };
            });

            // 汇总所有合箱后的箱列表
            const allBoxes = [];
            let totalBoxes = 0;
            let anyConsolidated = false;
            let anyHeightSplit = false;
            let anyFailed = false;

            groupPlans.forEach(g => {
                if (g.strategy === 'consol') {
                    if (g.consol.canConsolidate) {
                        totalBoxes += g.consol.totalBoxes;
                        if (g.consol.maxValidN > 1) anyConsolidated = true;
                        (g.consol.groupList || []).forEach(gl => {
                            allBoxes.push({
                                dims: gl.plan.dims,
                                weight: g.weight * gl.count,
                                qty: gl.n,
                                isCrate: g.isCrate,
                                groupId: g.id,
                                subKey: `${gl.count}件箱`
                            });
                        });
                    } else {
                        anyFailed = true;
                        allBoxes.push({
                            dims: [g.l, g.w, g.h],
                            weight: g.weight, qty: g.qty,
                            isCrate: g.isCrate,
                            groupId: g.id, subKey: '原箱'
                        });
                        totalBoxes += g.qty;
                    }
                } else if (g.strategy === 'heightSplit') {
                    totalBoxes += g.heightSplit.totalSubPkgs;
                    if (g.heightSplit.isSplit) anyHeightSplit = true;
                    if (!g.heightSplit.fitsAfterSplit) anyFailed = true;
                    allBoxes.push({
                        dims: g.heightSplit.newDims,
                        weight: g.heightSplit.newWeight,
                        qty: g.heightSplit.totalSubPkgs,
                        isCrate: g.isCrate,
                        groupId: g.id,
                        subKey: g.heightSplit.isSplit ? `拆${g.heightSplit.bestN}份` : '原箱'
                    });
                }
            });

            // 多承运商比价
            const carriersEval = allBoxes.length > 0 ? evaluateAllCarriers(allBoxes, region, country, { zip: auZip, isRemote: isRemoteCA, targetCN }) : null;

            // 用最优承运商的 per-box 成本回填到 groupPlans 中（仅 US 有 boxDetails）
            const carrierBoxMap = {};
            if (carriersEval && carriersEval.best && carriersEval.best.boxDetails) {
                carriersEval.best.boxDetails.forEach(d => {
                    carrierBoxMap[`${d.groupId}_${d.subKey}`] = d.result;
                });
            }
            groupPlans.forEach(g => {
                if (g.strategy === 'consol' && g.consol.canConsolidate && g.consol.groupList) {
                    g.consol.groupList.forEach(gl => {
                        const c = carrierBoxMap[`${g.id}_${gl.count}件箱`];
                        if (c) gl.cost = c;
                    });
                    g.consol.totalFreight = g.consol.groupList.reduce((s, gl) => s + (gl.cost ? gl.cost.totalCost * gl.n : 0), 0);
                } else if (g.strategy === 'heightSplit') {
                    const subK = g.heightSplit.isSplit ? `拆${g.heightSplit.bestN}份` : '原箱';
                    const c = carrierBoxMap[`${g.id}_${subK}`];
                    if (c) {
                        g.heightSplit.subCost = c;
                        g.heightSplit.totalFreight = c.totalCost * g.heightSplit.totalSubPkgs;
                    }
                }
            });

            return {
                totalCost: carriersEval && carriersEval.best ? carriersEval.best.totalCost : 0,
                totalBoxes, groupPlans,
                anyConsolidated, anyHeightSplit, anyFailed,
                anyOptimized: anyConsolidated || anyHeightSplit,
                canConsolidate: true,
                bestCarrier: carriersEval ? carriersEval.best : null,
                allCarriers: carriersEval ? carriersEval.all : []
            };
        }, [packageAnalyses, hasInput, region, country, auZip, isRemoteCA, targetCN]);

        // === 方案 C: 云鼎卡车 ===
        // 超长费规则（来自正确费率表）:
        //  ≥250cm + 计费重>301kg → +¥1/kg
        //  ≥250cm + 计费重≤301kg → 单询
        //  ≥300cm → max(¥3/kg, ¥2000/票)
        //  ≥400cm → max(¥4/kg, ¥4100/票)
        //  ≥500cm → max(¥5/kg, ¥10500/票)
        //  ≥600cm → 单询
        //  任两边长 ≥200cm → 单询
        const planYunding = useMemo(() => {
            if (!hasInput) return null;
            let totalVol = 0, totalActual = 0, maxSide = 0;
            let twoSidesOver200 = false;
            packageAnalyses.forEach(p => {
                totalVol += (p.l * p.w * p.h * p.qty) / 6000;
                totalActual += p.weight * p.qty;
                maxSide = Math.max(maxSide, p.dim.longest);
                const sidesOver200 = [p.l, p.w, p.h].filter(d => d >= 200).length;
                if (sidesOver200 >= 2) twoSidesOver200 = true;
            });
            const billWeight = Math.max(totalVol, totalActual);
            const freight = billWeight * RATES.yundingPerKg;
            const delivery = RATES.yundingDelivery;

            // 超长附加费
            let surcharge = 0;
            let surchargeTier = null;
            let surchargeDetail = null;  // {extraRate, minCharge, proRated, usedMin}
            let needsManualQuote = false;
            let quoteReason = null;

            if (maxSide >= 600) {
                needsManualQuote = true;
                quoteReason = `任一边长 ${maxSide.toFixed(0)}cm ≥600cm，需向物流公司单独询价`;
            } else if (twoSidesOver200) {
                needsManualQuote = true;
                quoteReason = '任两边长 ≥200cm，需向物流公司单独询价';
            } else if (maxSide >= 500) {
                const proRated = billWeight * 5;
                surcharge = Math.max(proRated, 10500);
                surchargeTier = '≥500cm';
                surchargeDetail = { extraRate: 5, minCharge: 10500, proRated, usedMin: proRated < 10500 };
            } else if (maxSide >= 400) {
                const proRated = billWeight * 4;
                surcharge = Math.max(proRated, 4100);
                surchargeTier = '≥400cm';
                surchargeDetail = { extraRate: 4, minCharge: 4100, proRated, usedMin: proRated < 4100 };
            } else if (maxSide >= 300) {
                const proRated = billWeight * 3;
                surcharge = Math.max(proRated, 2000);
                surchargeTier = '≥300cm';
                surchargeDetail = { extraRate: 3, minCharge: 2000, proRated, usedMin: proRated < 2000 };
            } else if (maxSide >= 250) {
                if (billWeight > 301) {
                    surcharge = billWeight * 1;
                    surchargeTier = '≥250cm (重货)';
                    surchargeDetail = { extraRate: 1, minCharge: 0, proRated: surcharge, usedMin: false };
                } else {
                    needsManualQuote = true;
                    quoteReason = `任一边长 ${maxSide.toFixed(0)}cm ≥250cm 且单票 ${billWeight.toFixed(1)}kg ≤301kg，需后端卡派核算附加费`;
                    surchargeTier = '≥250cm';
                }
            }

            return {
                totalCost: freight + delivery + surcharge,
                freight, delivery, surcharge,
                surchargeTier, surchargeDetail, needsManualQuote, quoteReason,
                billWeight, totalVol, totalActual, maxSide, twoSidesOver200
            };
        }, [packageAnalyses, hasInput]);

        // === 智能决策引擎 ===
        const recommendation = useMemo(() => {
            if (!hasInput || !planSplit || !planConsol || !planYunding) return null;

            // 综合各包装分析
            const anyOversized = packageAnalyses.some(p => !p.check.ok);
            const oversizedQty = packageAnalyses.filter(p => !p.check.ok).reduce((s, p) => s + p.qty, 0);
            const anyCrate = packageAnalyses.some(p => p.isCrate);
            const crateBoxCount = packageAnalyses.filter(p => p.isCrate).reduce((s, p) => s + p.qty, 0);
            const hasMixedTypes = packageAnalyses.length > 1;
            const hasMixedCrates = anyCrate && packageAnalyses.some(p => !p.isCrate);

            // 云鼎卡车仅适用于美国（海运到加州 + 卡车派送）
            const yundingAvailable = country === 'US';

            const candidates = [];
            if (planConsol.canConsolidate) {
                candidates.push({ key: 'consol', label: '优化方案', cost: planConsol.totalCost, boxes: planConsol.totalBoxes, available: true });
            }
            candidates.push({ key: 'split', label: '原箱发货', cost: planSplit.totalCost, boxes: planSplit.totalBoxes, available: true });
            if (yundingAvailable) {
                candidates.push({ key: 'yunding', label: '云鼎卡车', cost: planYunding.totalCost, boxes: 1, available: true });
            }

            const sortedByCost = [...candidates].sort((a, b) => a.cost - b.cost);
            // 默认偏好：合箱优先（除非有硬规则覆盖或云鼎显著更便宜）
            const consolCand = candidates.find(c => c.key === 'consol');
            const yundingCand = candidates.find(c => c.key === 'yunding');
            const splitCand = candidates.find(c => c.key === 'split');
            let best = consolCand || sortedByCost[0];
            const reasons = [];
            const ruleFlags = [];

            // === 业务硬规则覆盖（按优先级，云鼎仅美国可用）===

            // 规则1: 单件超规 + 数量 ≥ 3 → 强烈推荐云鼎（仅美国）
            if (yundingAvailable && anyOversized && oversizedQty >= 3) {
                best = yundingCand;
                ruleFlags.push('rule_oversized_multi');
                reasons.push(`有 ${oversizedQty} 件超规包装，分别发货将产生重复超规附加费 + 派送费`);
                reasons.push('建议直接走云鼎卡车派送');
            }
            // 规则2: 木箱包装 ≥ 3 箱 → 推荐云鼎（避免堆叠木箱附加费）
            else if (yundingAvailable && crateBoxCount >= 3) {
                if (planYunding.totalCost <= planSplit.totalCost * 1.1) {
                    best = yundingCand;
                    ruleFlags.push('rule_many_crates');
                    reasons.push(`共 ${crateBoxCount} 箱木箱包装，分别发货将产生 ${crateBoxCount}× 木箱附加费`);
                    reasons.push('云鼎卡车不收取木箱附加费，整车派送更划算');
                }
            }
            // 规则3: 艺彩玻璃灯 + 多件 → 走超大件/云鼎（PDF规范）
            else if (yundingAvailable && glassLamp && totalQty >= 2) {
                best = yundingCand;
                ruleFlags.push('rule_glass_lamp');
                reasons.push('艺彩玻璃灯多件订单 → 按操作规范直接走超大件渠道');
                reasons.push('优先保证运输安全性，降低破损风险');
            }
            // 规则4: 单件超规 + 数量 = 2
            else if (anyOversized && oversizedQty === 2) {
                if (yundingAvailable && planYunding.totalCost < planSplit.totalCost * 1.15) {
                    best = yundingCand;
                    ruleFlags.push('rule_oversized_pair');
                    reasons.push('超规包装 × 2 件，云鼎卡车成本接近且无重复附加费');
                } else {
                    best = splitCand;
                    reasons.push('超规包装 × 2 件，拆分发货成本较低，但需 2× 附加费');
                }
            }
            // 规则5: 总实重 ≥ 101kg → 云鼎起收线（仅美国）
            else if (yundingAvailable && totalWeight >= 101) {
                if (planYunding.totalCost <= sortedByCost[0].cost * 1.1) {
                    best = yundingCand;
                    ruleFlags.push('rule_heavy_total');
                    reasons.push(`总实重 ${totalWeight.toFixed(1)}kg 已达云鼎起收线`);
                }
            }
            // 规则6: 云鼎显著更便宜（合箱比云鼎贵 30% 以上）→ 用云鼎（仅美国）
            else if (yundingAvailable && planYunding.totalCost * 1.3 < planConsol.totalCost) {
                best = yundingCand;
                ruleFlags.push('rule_yunding_much_cheaper');
                reasons.push(`合箱成本 ¥${Math.round(planConsol.totalCost)} 比云鼎 ¥${Math.round(planYunding.totalCost)} 贵 ${Math.round((planConsol.totalCost / planYunding.totalCost - 1) * 100)}%`);
                reasons.push('云鼎卡车整体更经济');
            }
            // 默认：优化方案优先（合箱 / 高度拆分自动选用）
            else {
                if (planConsol.canConsolidate) {
                    best = consolCand;
                    if (planConsol.anyOptimized) {
                        const consolGroups = planConsol.groupPlans.filter(g => g.strategy === 'consol' && g.consol.canConsolidate && g.consol.maxValidN > 1);
                        const splitGroups = planConsol.groupPlans.filter(g => g.strategy === 'heightSplit' && g.heightSplit.isSplit);
                        const parts = [];
                        if (consolGroups.length > 0) parts.push(`${consolGroups.length} 种小件已合箱`);
                        if (splitGroups.length > 0) parts.push(`${splitGroups.length} 种超大件已高度拆分`);
                        if (parts.length > 0) reasons.push(parts.join('、'));
                        const savedBoxes = totalQty - planConsol.totalBoxes;
                        if (planConsol.bestCarrier) {
                            reasons.push(`走 ${planConsol.bestCarrier.name}（已比较 ${planConsol.allCarriers.length} 个常规承运商，此渠道最便宜）`);
                        }
                        if (planConsol.totalCost < planSplit.totalCost) {
                            reasons.push(`总运费 ¥${Math.round(planConsol.totalCost)}，比原箱发货省 ¥${Math.round(planSplit.totalCost - planConsol.totalCost)}`);
                        } else if (savedBoxes > 0) {
                            reasons.push(`箱数从 ${totalQty} 优化为 ${planConsol.totalBoxes}（节省 ${savedBoxes} 箱）`);
                        }
                    } else {
                        reasons.push('单件已符合常规渠道，按件发货即可');
                        if (planConsol.bestCarrier) {
                            reasons.push(`推荐走 ${planConsol.bestCarrier.name}（${planConsol.allCarriers.length} 个承运商中最便宜）`);
                        }
                    }
                } else {
                    best = splitCand;
                    reasons.push('无可优化空间，按原箱发货');
                    if (planSplit.bestCarrier) {
                        reasons.push(`推荐走 ${planSplit.bestCarrier.name}`);
                    }
                }
            }

            // 警告类信息
            const warnings = [];
            // 不再因缺重量而提示，仅在大件包装中通过 PackageRow 显示建议
            if (planConsol.anyFailed) warnings.push('部分包装合箱后超规，已按单件发货计算');
            if (hasMixedCrates) warnings.push('订单含混合包装类型（纸箱+木箱）');
            if (crateBoxCount >= 2) warnings.push(`含 ${crateBoxCount} 箱木箱，云鼎免木箱附加费`);

            return {
                best, candidates, sortedByCost,
                reasons, ruleFlags, warnings,
                anyOversized, anyCrate, crateBoxCount,
                hasMixedTypes, hasMixedCrates,
                totalWeight, totalQty,
                savings: {
                    vsSplit: planSplit.totalCost - best.cost,
                    vsConsol: planConsol.canConsolidate ? planConsol.totalCost - best.cost : 0,
                    vsYunding: planYunding.totalCost - best.cost
                }
            };
        }, [hasInput, planSplit, planConsol, planYunding, packageAnalyses, totalQty, totalWeight, glassLamp, country]);

        // === 卖价推演 ===
        const salesPrice = useMemo(() => {
            if (!hasInput || !recommendation) return null;
            const unitCost = parseFloat(purchasePrice) || 0;
            const rate = parseFloat(exchangeRate) || 7.2;
            const multiplier = parseFloat(profitMultiplier) || 2.4;

            const totalProductCost = unitCost * totalQty;

            // 推演运费 = 推荐方案的成本
            const recShippingCost = recommendation.best.cost;

            // 木箱材料成本（按推荐方案对应的实际箱型）
            // 我们用每个木箱包装的合箱后/拆分后/原箱尺寸来算
            let totalCrateCost = 0;
            const crateBreakdown = [];
            if (recommendation.best.key === 'consol' && planConsol.canConsolidate) {
                // 优化方案：每个木箱组按合箱/拆分后的箱型计算
                planConsol.groupPlans.forEach(g => {
                    if (!g.isCrate) return;
                    if (g.strategy === 'consol' && g.consol.canConsolidate) {
                        g.consol.groupList.forEach(gl => {
                            const cost = calculateCrateCost(gl.plan.dims[0], gl.plan.dims[1], gl.plan.dims[2]);
                            totalCrateCost += cost * gl.n;
                            crateBreakdown.push({ dims: gl.plan.dims, count: gl.n, costEach: cost });
                        });
                    } else if (g.strategy === 'heightSplit') {
                        const d = g.heightSplit.newDims;
                        const cost = calculateCrateCost(d[0], d[1], d[2]);
                        totalCrateCost += cost * g.heightSplit.totalSubPkgs;
                        crateBreakdown.push({ dims: d, count: g.heightSplit.totalSubPkgs, costEach: cost });
                    }
                });
            } else if (recommendation.best.key === 'yunding') {
                // 云鼎：超大件必打夹板木箱，按原箱尺寸
                packageAnalyses.forEach(p => {
                    if (!p.isCrate && !p.isOversized) return;
                    const isReallyNeedCrate = p.isCrate || !p.check.ok;  // 木箱标识 或 超大件
                    if (!isReallyNeedCrate) return;
                    const cost = calculateCrateCost(p.l, p.w, p.h);
                    totalCrateCost += cost * p.qty;
                    crateBreakdown.push({ dims: [p.l, p.w, p.h], count: p.qty, costEach: cost });
                });
            } else {
                // 原箱发货：每个木箱按原箱尺寸
                packageAnalyses.forEach(p => {
                    if (!p.isCrate) return;
                    const cost = calculateCrateCost(p.l, p.w, p.h);
                    totalCrateCost += cost * p.qty;
                    crateBreakdown.push({ dims: [p.l, p.w, p.h], count: p.qty, costEach: cost });
                });
            }

            const totalCostCNY = totalProductCost + recShippingCost + totalCrateCost;
            const totalSellingUSD = (totalCostCNY * multiplier) / rate;
            const unitSellingUSD = totalQty > 0 ? totalSellingUSD / totalQty : 0;

            return {
                unitCost, rate, multiplier,
                totalProductCost,
                recShippingCost,
                totalCrateCost,
                crateBreakdown,
                totalCostCNY,
                totalSellingUSD,
                unitSellingUSD
            };
        }, [hasInput, recommendation, purchasePrice, exchangeRate, profitMultiplier, totalQty, planConsol, packageAnalyses]);

        // === 渲染 ===
        return (
            <div className="min-h-screen pb-24">
                {/* HERO HEADER */}
                <div className="max-w-7xl mx-auto px-6 pt-12 pb-8">
                    <div className="flex items-end justify-between gap-6 flex-wrap">
                        <div>
                            <div className="flex items-center gap-3 mb-3">
                                <span className="stamp" style={{color: 'var(--accent)'}}>OPS · V2.0</span>
                                <span className="text-xs font-bold tracking-widest" style={{color: 'var(--ink-3)'}}>
                                    包装优化规范 V1.0 · 2026.05
                                </span>
                            </div>
                            <h1 className="font-display text-6xl md:text-7xl font-extrabold tracking-tighter" style={{color: 'var(--ink)'}}>
                                合箱智能<span style={{color: 'var(--accent)'}}>规划器</span>
                            </h1>
                            <p className="mt-3 text-sm font-medium max-w-xl" style={{color: 'var(--ink-3)'}}>
                                输入单件包装尺寸与订单数量，系统自动评估
                                <span className="font-bold" style={{color: 'var(--ink)'}}> 优化方案 / 原箱发货 / 云鼎卡车 </span>
                                三套策略。小件自动合箱，超大件高度拆分，避免重复改单与附加费。
                            </p>
                        </div>
                        <div className="flex items-center gap-6 pb-2">
                            <div className="text-right">
